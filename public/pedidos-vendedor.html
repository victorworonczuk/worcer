<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worcer · Pedidos por vendedor</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#2453ff" />
  <link rel="stylesheet" href="assets/piezas.css" />
  <link rel="stylesheet" href="assets/produccion.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Worcer · Pedidos por vendedor</h1>
      <div class="subtitle" id="user-subtitle">Cargando…</div>
    </div>
    <div class="topbar-actions">
      <a href="/cargar-pedidos.html" class="nav-link">Cargar pedidos</a>
      <a href="/cotejar-vendedores.html" class="nav-link">Cotejar vendedores</a>
      <a href="/index.html" class="nav-link">← Ver dashboard</a>
      <a href="/api/logout" class="logout-link">Cerrar sesión</a>
    </div>
  </header>

  <main class="piezas-main">
    <div class="panel">
      <div class="filters">
        <div class="field-inline">
          <label for="f-mes">Mes</label>
          <select id="f-mes"></select>
        </div>
      </div>

      <div id="resumen" class="resumen"></div>

      <div class="metric-tabs" id="metric-tabs">
        <button type="button" class="metric-tab active" data-tipo="cantidad">Cantidad de pedidos</button>
        <button type="button" class="metric-tab" data-tipo="monto">Pedidos valorizados ($)</button>
      </div>

      <div class="table-wrap">
        <table class="pivot">
          <thead id="thead"></thead>
          <tbody id="tbody">
            <tr><td class="loading">Cargando datos…</td></tr>
          </tbody>
        </table>
      </div>
      <p class="nota-pie" id="nota-pie"></p>
    </div>

    <div class="panel">
      <h2 class="panel-title">Total acumulado del año</h2>
      <div class="table-wrap">
        <table class="pivot">
          <thead>
            <tr>
              <th class="col-grupo">Vendedor</th>
              <th>Cantidad de pedidos</th>
              <th>Pedidos valorizados ($)</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody id="tbody-anual">
            <tr><td class="loading">Cargando datos…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/pedidos-vendedor.js"></script>
</body>
</html>
