<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worcer · Cargar factura</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nueva-factura.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Worcer · Cargar factura</h1>
      <div class="subtitle" id="user-subtitle">Cargando…</div>
    </div>
    <div class="topbar-actions">
      <a href="/piezas.html" class="nav-link">Análisis de piezas</a>
      <a href="/index.html" class="nav-link">← Ver dashboard</a>
      <a href="/api/logout" class="logout-link">Cerrar sesión</a>
    </div>
  </header>

  <main class="factura-main">
    <form id="factura-form" class="panel factura-form">
      <div class="field">
        <label for="cliente-input">Cliente</label>
        <input type="text" id="cliente-input" autocomplete="off" placeholder="Escribí el nombre o CUIT..." required />
        <div id="cliente-suggestions" class="suggestions"></div>
        <input type="hidden" id="cliente-id" />
        <div id="cliente-selected" class="selected-hint"></div>
      </div>

      <div class="field">
        <label>Empresa que factura</label>
        <div class="linea-options">
          <label class="linea-radio"><input type="radio" name="empresa" value="Ceramica" required /> Cerámica <span class="tag-facturado">Factura A</span></label>
          <label class="linea-radio"><input type="radio" name="empresa" value="Porcelanas" /> Porcelanas <span class="tag-facturado">Factura A</span></label>
          <label class="linea-radio"><input type="radio" name="empresa" value="Presupuesto" /> Presupuesto <span class="tag-sin-factura">Remito X</span></label>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="fecha-input">Fecha</label>
          <input type="date" id="fecha-input" required />
        </div>
        <div class="field">
          <label for="numero-input">N° de comprobante (opcional)</label>
          <input type="text" id="numero-input" placeholder="0001-00001234" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="ars-input">Importe ARS</label>
          <input type="number" id="ars-input" step="0.01" min="0" required />
          <div id="ars-hint" class="ars-hint"></div>
        </div>
        <div class="field">
          <label for="usd-input">Importe USD (opcional)</label>
          <input type="number" id="usd-input" step="0.01" min="0" />
        </div>
      </div>

      <div class="field">
        <label>Piezas vendidas <span class="opcional-tag">(opcional)</span></label>
        <div id="piezas-rows"></div>
        <button type="button" id="add-pieza-btn" class="add-pieza-btn">+ Agregar otra pieza</button>
      </div>

      <div id="form-error" class="form-error"></div>
      <button type="submit" id="submit-btn">Cargar factura</button>
    </form>

    <div class="panel recientes-panel">
      <h2>Cargadas hoy</h2>
      <div id="recientes-list" class="recientes-list">
        <div class="loading">Cargando…</div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/nueva-factura.js"></script>
</body>
</html>
