<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worcer · Producción</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/piezas.css" />
  <link rel="stylesheet" href="assets/produccion.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Worcer · Producción</h1>
      <div class="subtitle" id="user-subtitle">Cargando…</div>
    </div>
    <div class="topbar-actions">
      <a href="/produccion-carga.html" class="nav-link">Cargar producción</a>
      <a href="/recuento.html" class="nav-link">Recuento</a>
      <a href="/piezas.html" class="nav-link">Análisis de piezas</a>
      <a href="/index.html" class="nav-link">← Ver dashboard</a>
      <a href="/api/logout" class="logout-link">Cerrar sesión</a>
    </div>
  </header>

  <main class="piezas-main">
    <div class="panel">
      <div class="filters">
        <div class="field-inline">
          <label for="f-linea">Línea</label>
          <select id="f-linea"><option value="">Todas</option></select>
        </div>
        <div class="field-inline">
          <label for="f-agrupar">Agrupar por</label>
          <select id="f-agrupar">
            <option value="pieza">Pieza (calidades sumadas)</option>
            <option value="pieza_calidad">Pieza + calidad</option>
            <option value="linea">Línea</option>
          </select>
        </div>
        <div class="field-inline">
          <label for="f-calidad">Calidad</label>
          <select id="f-calidad">
            <option value="">Todas</option>
            <option value="1era">1ª</option>
            <option value="comercial">Comercial (2ª)</option>
            <option value="3era">3ª</option>
          </select>
        </div>
        <div class="field-inline">
          <label for="f-desde">Desde</label>
          <input type="date" id="f-desde" />
        </div>
        <div class="field-inline">
          <label for="f-hasta">Hasta</label>
          <input type="date" id="f-hasta" />
        </div>
        <button type="button" id="limpiar-btn" class="limpiar-btn">Limpiar</button>
      </div>

      <div id="resumen" class="resumen"></div>

      <div class="metric-tabs" id="metric-tabs">
        <button type="button" class="metric-tab active" data-tipo="produccion">Producción</button>
        <button type="button" class="metric-tab" data-tipo="venta">Venta</button>
        <button type="button" class="metric-tab" data-tipo="rotura">Rotura</button>
        <button type="button" class="metric-tab metric-tab-stock" data-tipo="stock">Stock y $</button>
      </div>

      <div class="table-wrap">
        <table class="pivot">
          <thead id="thead"></thead>
          <tbody id="tbody">
            <tr><td class="loading">Cargando datos…</td></tr>
          </tbody>
        </table>
      </div>
      <p class="nota-pie" id="nota-pie"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/produccion.js"></script>
</body>
</html>
